project:
  type: website
  output-dir: docs       # GitHub Pages serves from /docs on the main branch
  execute-dir: project   # run all code chunks from the project root so data/ paths resolve

website:
  title: "Team HeeHaa"
  description: "VAST Challenge 2026 MC1 — Detecting Embargo Breach in a Multi-Agent AI Communication Network"
  page-navigation: true
  navbar:
    background: primary
    search: true
    left:
      - href: index.qmd
        text: Home
      - href: proposal.qmd
        text: Proposal
      - text: Methodology
        menu:
          - href: methodology/data-prep.qmd
            text: "Data Preparation"
          - href: methodology/analytical-computation.qmd
            text: "Analytical Computation"
          - href: findings.qmd
            text: "Findings"
          - href: methodology/interactive-presentation.qmd
            text: "Interactive Presentation"
      - href: poster.qmd
        text: Poster
      - href: minutes.qmd
        text: "Meeting Minutes"
      - href: team.qmd
        text: "The Team"
      - text: "Shiny App"
        menu:
          - href: user-guide.qmd
            text: "User Guide"
          - text: "Launch Shiny App"
            # TODO: replace with your live Shiny app URL (e.g. https://YOURNAME.shinyapps.io/teamheehaa/)
            href: "https://example.shinyapps.io/REPLACE-ME/"
            target: _blank
    right:
      - text: GitHub
        icon: github
        menu:
          - text: "Project Site Repo"
            href: "https://github.com/wmyee-21/ISSS608-VAA_Project"
            target: _blank
          - text: "Shiny App Repo"
            # app.R / global.R live in this same repo; update if you split it out later
            href: "https://github.com/wmyee-21/ISSS608-VAA_Project"
            target: _blank
  page-footer:
    center: "Team HeeHaa · ISSS608 Visual Analytics & Applications · VAST Challenge 2026 MC1"

format:
  html:
    theme: theme.scss
    toc: true
    toc-depth: 3
    css: styles.css
    code-fold: true
    code-tools: true
    grid:
      body-width: 920px

execute:
  warning: false
  message: false
  freeze: auto
