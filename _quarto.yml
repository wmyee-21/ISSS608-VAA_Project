project:
  type: website
  output-dir: docs       # GitHub Pages serves from /docs on the main branch
  execute-dir: project   # run all code chunks from the project root so data/ paths resolve

website:
  title: "CSM TraceForce"
  description: "VAST Challenge 2026 MC1 — Detecting Embargo Breach in a Multi-Agent AI Communication Network"
  favicon: images/logo.svg
  page-navigation: true
  navbar:
    background: primary
    logo: images/logo.svg
    logo-alt: "CSM TraceForce logo"
    search: true
    left:
      - href: index.qmd
        text: Home
      - href: proposal.qmd
        text: Proposal
      - text: Methodology
        menu:
          - href: methodology/data-prep.qmd
            text: "Data Preparation"
          - href: methodology/analytical-computation.qmd
            text: "Analytical Computation"
          - href: findings.qmd
            text: "Findings"
          - href: methodology/interactive-presentation.qmd
            text: "Interactive Presentation"
      - href: poster.qmd
        text: Poster
      - href: minutes.qmd
        text: "Meeting Minutes"
      - href: team.qmd
        text: "The Team"
      - text: "Shiny App"
        menu:
          - href: user-guide.qmd
            text: "User Guide"
          - href: shiny-app.qmd
            text: "Launch App (coming soon)"
    right:
      - text: GitHub
        icon: github
        menu:
          - text: "Project Site Repo"
            href: "https://github.com/wmyee-21/ISSS608-VAA_Project"
            target: _blank
          - text: "Shiny App Repo"
            href: "https://github.com/wmyee-21/ISSS608-VAA_ShinyApp"
            target: _blank
  page-footer:
    center: "CSM TraceForce · Cari-On, Be Serene, Mark it Done · ISSS608 Visual Analytics & Applications"

format:
  html:
    theme: theme.scss
    toc: true
    toc-depth: 3
    css: styles.css
    code-fold: true
    code-tools: true
    grid:
      body-width: 920px

execute:
  warning: false
  message: false
  freeze: auto
